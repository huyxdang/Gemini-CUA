<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Handle Retina
const W = 250, H = 250;
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

const CX = W / 2, CY = H / 2;
const BASE_R = 42;

const COLORS = [
  { r: 99,  g: 102, b: 241 },  // indigo
  { r: 168, g: 85,  b: 247 },  // purple
  { r: 236, g: 72,  b: 153 },  // pink
  { r: 34,  g: 211, b: 238 },  // cyan
  { r: 59,  g: 130, b: 246 },  // blue
];

let state = 'idle';
let amplitude = 0;
let smoothAmp = 0;
let visibility = 0;
let t = 0;
let lastTs = 0;
let running = false;

// --- API called from Python ---
function setState(s) {
  state = s;
  // Auto-transition: activated -> listening after 300ms (avoids blocking Python)
  if (s === 'activated') {
    setTimeout(() => { if (state === 'activated') state = 'listening'; }, 300);
  }
  // Restart render loop if stopped
  if (s !== 'idle' && !running) { running = true; lastTs = 0; requestAnimationFrame(draw); }
}
function setAmplitude(v) { amplitude = Math.min(1, Math.max(0, v)); }

// --- Drawing ---
function draw(timestamp) {
  const dt = lastTs ? Math.min((timestamp - lastTs) / 1000, 0.05) : 1 / 60;
  lastTs = timestamp;
  t += dt;

  // Smooth amplitude
  smoothAmp += (amplitude - smoothAmp) * 0.18;
  amplitude *= 0.91;

  // Visibility easing
  const targetVis = state === 'idle' ? 0 : 1;
  const vSpeed = state === 'idle' ? 0.035 : 0.14;
  visibility += (targetVis - visibility) * vSpeed;

  ctx.clearRect(0, 0, W, H);
  // Stop loop when fully invisible to save CPU
  if (visibility < 0.003 && state === 'idle') { running = false; return; }

  const vis = visibility;
  const r = BASE_R * (0.4 + vis * 0.6) * (1 + smoothAmp * 0.08);
  const speed = state === 'thinking' ? 2.8 : 1;

  // --- Outer glow ---
  const glowR = r * 2.8;
  const glow = ctx.createRadialGradient(CX, CY, r * 0.3, CX, CY, glowR);
  glow.addColorStop(0, `rgba(130, 90, 255, ${0.28 * vis})`);
  glow.addColorStop(0.45, `rgba(168, 85, 247, ${0.08 * vis})`);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(CX, CY, glowR, 0, Math.PI * 2);
  ctx.fill();

  // --- Orb layers (clipped to circle) ---
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, r, 0, Math.PI * 2);
  ctx.clip();

  for (let i = 0; i < 4; i++) {
    const c = COLORS[(i + Math.floor(t * speed * 0.25)) % COLORS.length];
    const angle = t * speed * (0.35 + i * 0.18) + i * Math.PI * 0.6;
    const ox = Math.cos(angle) * r * 0.38;
    const oy = Math.sin(angle) * r * 0.38;

    const g = ctx.createRadialGradient(CX + ox, CY + oy, 0, CX + ox, CY + oy, r * 1.3);
    g.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${0.92 * vis})`);
    g.addColorStop(0.55, `rgba(${c.r},${c.g},${c.b},${0.2 * vis})`);
    g.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);

    ctx.globalCompositeOperation = i === 0 ? 'source-over' : 'lighter';
    ctx.fillStyle = g;
    ctx.fillRect(CX - r, CY - r, r * 2, r * 2);
  }
  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';

  // --- Specular highlight ---
  const hl = ctx.createRadialGradient(CX - r * 0.28, CY - r * 0.28, 0, CX, CY, r);
  hl.addColorStop(0, `rgba(255,255,255,${0.28 * vis})`);
  hl.addColorStop(0.35, `rgba(255,255,255,${0.06 * vis})`);
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  ctx.beginPath();
  ctx.arc(CX, CY, r, 0, Math.PI * 2);
  ctx.fill();

  // --- Audio rings (listening / speaking) ---
  if (smoothAmp > 0.008 && (state === 'listening' || state === 'speaking' || state === 'activated')) {
    for (let i = 1; i <= 3; i++) {
      const ringR = r * (1 + i * 0.18 + smoothAmp * i * 0.28);
      const alpha = smoothAmp * (0.45 / i) * vis;
      ctx.strokeStyle = `rgba(200,180,255,${alpha})`;
      ctx.lineWidth = Math.max(0.5, 2.2 - i * 0.6);
      ctx.beginPath();
      ctx.arc(CX, CY, ringR, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // --- Thinking: expanding pulse ring ---
  if (state === 'thinking') {
    const phase = (t * 1.8) % 1;
    const pulseR = r * (1 + phase * 0.9);
    const alpha = (1 - phase) * 0.35 * vis;
    ctx.strokeStyle = `rgba(168,85,247,${alpha})`;
    ctx.lineWidth = 2.2 * (1 - phase);
    ctx.beginPath();
    ctx.arc(CX, CY, pulseR, 0, Math.PI * 2);
    ctx.stroke();

    // Second offset pulse
    const phase2 = (t * 1.8 + 0.5) % 1;
    const pulseR2 = r * (1 + phase2 * 0.9);
    const alpha2 = (1 - phase2) * 0.2 * vis;
    ctx.strokeStyle = `rgba(99,102,241,${alpha2})`;
    ctx.lineWidth = 1.8 * (1 - phase2);
    ctx.beginPath();
    ctx.arc(CX, CY, pulseR2, 0, Math.PI * 2);
    ctx.stroke();
  }

  // --- Subtle edge ring ---
  ctx.strokeStyle = `rgba(255,255,255,${0.12 * vis})`;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(CX, CY, r + 1, 0, Math.PI * 2);
  ctx.stroke();

  requestAnimationFrame(draw);
}

// Don't start loop on load — setState() will kick it off when needed
</script>
</body>
</html>
